<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>검색창</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <!-- 검색 박스 -->
      <div class="search-container">
        <input type="text" placeholder="검색어를 입력해주세요" />

        <span class="material-symbols-outlined search-icon"> search </span>
      </div>

      <!-- 최근 검색어 -->
      <div class="section">
        <h2>최근 검색어</h2>
        <ul id="recentList">
          <li>
            에어 포스<span class="material-symbols-outlined close-btn"
              >close</span
            >
          </li>
          <li>
            푸마 <span class="material-symbols-outlined close-btn">close</span>
          </li>
          <li>
            스니커즈
            <span class="material-symbols-outlined close-btn">close</span>
          </li>
          <li>
            슈퍼스타
            <span class="material-symbols-outlined close-btn">close</span>
          </li>
        </ul>
      </div>

      <!-- 인기 검색어 -->
      <div class="section">
        <h2>인기 검색어</h2>
      </div>
      <ul class="rank-list">
        <li>
          <span class="rank">1</span>
          <span class="keyword">아디다스</span>
          <span class="arrow up">▲</span>
        </li>
        <li>
          <span class="rank">2</span>
          <span class="keyword">에어 포스</span>
          <span class="arrow down">▼</span>
        </li>
        <li>
          <span class="rank">3</span>
          <span class="keyword">휠라</span>
          <span class="arrow up">▲</span>
        </li>
        <li>
          <span class="rank">4</span>
          <span class="keyword">운동화</span>
          <span class="arrow down">▼</span>
        </li>
        <li>
          <span class="rank">5</span>
          <span class="keyword">크록스</span>
          <span class="arrow up">▲</span>
        </li>
      </ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
